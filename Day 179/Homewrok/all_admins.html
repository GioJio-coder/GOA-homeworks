<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>ადმინების სია</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-3">ადმინისტრატორების მართვა</h1>
        <div class="grid gap-4 md:grid-cols-2">
            {% for admin in admins %}
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition">
                <h2 class="text-xl font-semibold text-gray-700 capitalize">{{ admin.admin_name }}</h2>
                <p class="text-sm text-indigo-600 font-medium my-1">{{ admin.role }}</p>
                <a href="/admins/{{ admin.id }}/"
                    class="inline-block mt-3 text-sm text-gray-500 hover:text-indigo-600 font-medium">
                    პროფილის ნახვა &rarr;
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>

</html>
